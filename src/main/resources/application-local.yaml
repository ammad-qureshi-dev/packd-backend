spring:
  application:
    name: server_api
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/postgres?prepareThreshold=0
    username: ${DB_USER}
    password: ${DB_PWD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      # This clears any cached prepared statements before reusing the connection.
      connection-init-sql: "DISCARD ALL"
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: update
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
server:
  port: 8080
logging:
  level:
    com.cash_money.backend_service: debug
cookies:
  secure: false
  sameSite: Lax
  httpOnly: false
